<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Library - Cognitive Shift</title>
    <script src="assets/theme.js"></script>
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="stylesheet" href="assets/library.css">
  </head>
  <body data-page="library">
    <main class="library-page">
      <nav class="library-back" aria-label="Back navigation">
        <a href="home.html">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m15 18-6-6 6-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <span>back to previous page</span>
        </a>
      </nav>

      <header class="library-page-header">
        <h1 id="library-page-title">Library</h1>
        <p id="library-page-description"></p>
        <label class="library-search-pill" for="library-search">
          <svg class="library-search-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="m21 21-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          </svg>
          <input id="library-search" type="search" autocomplete="off" placeholder="" aria-label="Search this library">
          <button class="library-search-clear" type="button" aria-label="Clear search" hidden>&times;</button>
        </label>
      </header>

      <section class="library-results" aria-label="Library resources">
        <div id="library-page-grid" class="library-page-grid" aria-live="polite"></div>
        <p id="library-page-empty" class="library-page-empty" hidden>No resource found.</p>
      </section>
    </main>

    <script src="assets/app.js"></script>
  </body>
</html>
